<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Call Sinaling</title>
  </head>
  <body>
    <hr />

    <h2>Login</h2>
    <form id="loginForm">
      <input id="email" placeholder="Email" autocomplete="username" />
      <input
        id="password"
        type="password"
        placeholder="Password"
        autocomplete="current-password" />
      <button type="submit">Login</button>
    </form>

    <hr />

    <h2>My Friends</h2>
    <button id="loadFriendsBtn">Load Friends</button>
    <ul id="friendsList"></ul>

    <h1>Call Signaling</h1>
    <div>
      <label>My User ID:</label>
      <input id="myId" placeholder="UserID 01" type="text" />
    </div>
    <br />
    <div>
      <label>Target User ID to call:</label>
      <input id="targetId" placeholder="UserID 02" type="text" />
    </div>
    <br />
    <div>
      <button id="connectBtn">Signaling connection</button>
      <button id="startCameraBtn">Activate camera</button>
      <button id="callBtn">Start calling</button>
      <button id="hangupBtn">Hang up the call</button>
    </div>
    <br />
    <div>
      <p>Call Signaling status</p>
      <pre id="log"></pre>
    </div>

    <br />
    <div>
      <h3>Local Video</h3>
      <video
        id="localVideo"
        autoplay
        playsinline
        muted
        width="320"
        height="240"></video>
    </div>
    <br />
    <div>
      <h3>Remote Video</h3>
      <video
        id="remoteVideo"
        autoplay
        playsinline
        muted
        width="320"
        height="240"></video>
    </div>

    <script src="./index.js"></script>
  </body>
</html>
